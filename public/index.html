<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        
        body{
            font-family:'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background:#0f172a;
            color:#f8fafc;
            min-height:100vh;
            line-height:1.6;
            overflow-x:hidden;
            font-weight:400
        }
        
        /* Navigation */
        .nav{
            position:fixed;
            top:0;
            right:0;
            left:0;
            z-index:1000;
            padding:20px 40px;
            background:linear-gradient(180deg, rgba(15,23,42,0.9) 0%, rgba(15,23,42,0) 100%);
            backdrop-filter:blur(10px)
        }
        
        .nav-container{
            display:flex;
            justify-content:space-between;
            align-items:center;
            max-width:1400px;
            margin:0 auto
        }
        
        .nav-links{
            display:flex;
            gap:32px;
            list-style:none
        }
        
        .nav-links a{
            color:#94a3b8;
            text-decoration:none;
            font-size:14px;
            font-weight:500;
            transition:color .3s ease;
            cursor:pointer;
            font-family:'Poppins', sans-serif
        }
        
        .nav-links a:hover{
            color:#f8fafc
        }
        
        /* Hero Section */
        .hero{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            padding:40px 20px;
            position:relative
        }
        
        .hero::before{
            content:'';
            position:absolute;
            top:0;
            left:0;
            right:0;
            bottom:0;
            background:radial-gradient(circle at 50% 50%, rgba(99,102,241,0.1) 0%, transparent 50%);
            pointer-events:none
        }
        
        .hero-content{
            position:relative;
            z-index:2;
            max-width:900px
        }
        
        .hero-title{
            font-family:'Playfair Display', 'Poppins', serif;
            font-size:clamp(3rem,8vw,6rem);
            font-weight:900;
            margin-bottom:32px;
            background:linear-gradient(135deg, #f8fafc 0%, #64748b 100%);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            line-height:1.1;
            letter-spacing:-0.01em
        }
        
        .hero-subtitle{
            font-size:1.25rem;
            color:#94a3b8;
            margin-bottom:48px;
            font-weight:400
        }
        
        .cta-button{
            display:inline-block;
            background:linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color:white;
            padding:16px 40px;
            border-radius:50px;
            text-decoration:none;
            font-weight:600;
            font-size:16px;
            transition:all .3s ease;
            box-shadow:0 10px 40px rgba(99,102,241,0.3);
            cursor:pointer;
            border:none;
            font-family:'Poppins', sans-serif;
            letter-spacing:0.02em
        }
        
        .cta-button:hover{
            transform:translateY(-2px);
            box-shadow:0 20px 60px rgba(99,102,241,0.4)
        }
        
        /* Main Content */
        .main-content{
            display:none;
            max-width:1200px;
            margin:0 auto;
            padding:40px 20px
        }
        
        .main-content.active{
            display:block
        }
        
        .container{max-width:1200px;margin:0 auto;padding:32px}
        
                
        .tab-content{
            display:none;
            background:#1e293b;
            padding:32px;
            border-radius:12px;
            box-shadow:0 1px 3px rgba(0,0,0,.3);
            margin-bottom:24px;
            border:1px solid #334155
        }
        
        .tab-content.active{display:block}
        
        .form-group{margin-bottom:24px}
        
        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#f8fafc;
            font-size:14px;
            font-family:'Poppins', sans-serif
        }
        
        input,select{
            width:100%;
            padding:12px 16px;
            border:1px solid #334155;
            border-radius:8px;
            font-size:14px;
            background:#0f172a;
            transition:border-color .2s ease,box-shadow .2s ease;
            color:#f8fafc;
            font-family:'Poppins', sans-serif
        }
        
        input:focus,select:focus{
            outline:none;
            border-color:#6366f1;
            box-shadow:0 0 0 3px rgba(99,102,241,.1)
        }
        
        button{
            background:linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color:white;
            padding:12px 24px;
            border:0;
            border-radius:8px;
            cursor:pointer;
            font-size:14px;
            font-weight:600;
            margin-right:12px;
            transition:all .2s ease;
            box-shadow:0 1px 2px rgba(0,0,0,.05);
            font-family:'Poppins', sans-serif
        }
        
        button:hover{
            background:linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transform:translateY(-1px);
            box-shadow:0 4px 12px rgba(99,102,241,.15)
        }
        
        button:active{transform:translateY(0)}
        button:disabled{background:#94a3b8;cursor:not-allowed}
        
        .student-list{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
            gap:24px;
            margin-top:32px
        }
        
        .student-card{
            background:#1e293b;
            padding:24px;
            border-radius:12px;
            box-shadow:0 1px 3px rgba(0,0,0,.3);
            text-align:center;
            border:1px solid #334155;
            transition:all .2s ease;
            position:relative
        }
        
        .student-card:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 25px rgba(0,0,0,.08)
        }
        
        .qr-code{
            margin:16px 0;
            padding:16px;
            background:#0f172a;
            border-radius:8px;
            border:1px solid #334155
        }
        
        .scanner-container{
            text-align:center;
            margin:32px 0
        }
        
        #reader{
            width:320px;
            height:320px;
            margin:0 auto;
            border:1px solid #334155;
            border-radius:12px;
            background:#0f172a
        }
        
        .attendance-list{margin-top:32px}
        
        .attendance-item{
            background:#1e293b;
            padding:20px 24px;
            margin-bottom:16px;
            border-radius:12px;
            box-shadow:0 1px 3px rgba(0,0,0,.3);
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-left:4px solid transparent;
            transition:all .2s ease;
            border:1px solid #334155
        }
        
        .attendance-item:hover{
            transform:translateX(4px);
            box-shadow:0 4px 12px rgba(0,0,0,.08);
            border-left-color:#6366f1
        }
        
        .section-badge{
            background:#6366f1;
            color:white;
            padding:4px 12px;
            border-radius:20px;
            font-size:12px;
            font-weight:600
        }
        
        .time{
            color:#64748b;
            font-size:12px;
            font-weight:500;
            font-family:'Poppins', sans-serif
        }
        
        .success-message{
            background:linear-gradient(135deg, #10b981 0%, #059669 100%);
            color:white;
            padding:16px 20px;
            border-radius:8px;
            margin:16px 0;
            border-left:4px solid #059669;
            box-shadow:0 2px 4px rgba(16,185,129,.1)
        }
        
        .error-message{
            background:linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color:white;
            padding:16px 20px;
            border-radius:8px;
            margin:16px 0;
            border-left:4px solid #dc2626;
            box-shadow:0 2px 4px rgba(239,68,68,.1)
        }
        
        .session-info{
            background:linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color:white;
            padding:20px 24px;
            border-radius:12px;
            margin-bottom:24px;
            text-align:center;
            box-shadow:0 2px 8px rgba(99,102,241,.15)
        }
        
        .delete-btn{
            position:absolute;
            top:12px;
            right:12px;
            background:#ef4444;
            color:white;
            border:0;
            border-radius:50%;
            width:28px;
            height:28px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:all .2s ease;
            box-shadow:0 2px 4px rgba(239,68,68,.15)
        }
        
        .delete-btn:hover{
            background:#dc2626;
            transform:scale(1.1);
            box-shadow:0 4px 8px rgba(239,68,68,.25)
        }
        
        .delete-btn:active{transform:scale(.95)}
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <div class="logo">
                <h2 style="color: #f8fafc; font-weight: 600;">QR Attendance</h2>
            </div>
            <ul class="nav-links">
                <li><a onclick="navigateToTab('students')">Students</a></li>
                <li><a onclick="navigateToTab('scanner')">Scanner</a></li>
                <li><a onclick="navigateToTab('attendance')">Attendance</a></li>
                <li><a onclick="navigateToTab('session')">Session</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="heroSection">
        <div class="hero-content">
            <h1 class="hero-title">QR Attendance System</h1>
            <button class="cta-button" onclick="showMainContent()">VIEW SYSTEM</button>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="container">
        
        <!-- Students Tab -->
        <div id="students-tab" class="tab-content active">
            <h2>Add Student</h2>
            <div class="form-group">
                <label>Student ID:</label>
                <input type="text" id="studentId" placeholder="Enter student ID">
            </div>
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="studentName" placeholder="Enter student name">
            </div>
            <button onclick="addStudent()">Add Student</button>
            <button onclick="generateQRCode()">Generate QR Code</button>
            
            <div id="studentList" class="student-list"></div>
        </div>
        
        <!-- Scanner Tab -->
        <div id="scanner-tab" class="tab-content">
            <h2>Scan QR Code</h2>
            <div class="session-info" id="sessionInfo" style="display: none;">
                <strong>Current Session: <span id="currentSection"></span></strong>
            </div>
            <div class="scanner-container">
                <div id="reader"></div>
                <div id="scanResult"></div>
            </div>
        </div>
        
        <!-- Attendance Tab -->
        <div id="attendance-tab" class="tab-content">
            <h2>Attendance Records</h2>
            <button onclick="refreshAttendance()">Refresh</button>
            <button onclick="exportAttendance()">Export CSV</button>
            <div id="attendanceList" class="attendance-list"></div>
        </div>
        
        <!-- Session Tab -->
        <div id="session-tab" class="tab-content">
            <h2>Session Management</h2>
            <div class="form-group">
                <label>Section:</label>
                <select id="sectionSelect">
                    <option value="">Select Section</option>
                    <option value="A">Section A</option>
                    <option value="B">Section B</option>
                    <option value="C">Section C</option>
                    <option value="D">Section D</option>
                </select>
            </div>
            <button onclick="startSession()" id="startBtn">Start Session</button>
            <button onclick="endSession()" id="endBtn" disabled>End Session</button>
        </div>
        </div>
    </main>

    <script>
        let currentTab = 'students';
        let currentSection = null;
        let students = [];
        let attendance = [];
        let html5QrCode = null;

        // Navigation functions
        function showHero() {
            document.getElementById('heroSection').style.display = 'flex';
            document.getElementById('mainContent').classList.remove('active');
        }

        function showMainContent() {
            document.getElementById('heroSection').style.display = 'none';
            document.getElementById('mainContent').classList.add('active');
        }

        function navigateToTab(tabName) {
            showMainContent();
            setTimeout(() => showTab(tabName), 100);
        }

        // Tab management
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            currentTab = tabName;
            
            // Initialize scanner if scanner tab
            if (tabName === 'scanner' && !html5QrCode) {
                setTimeout(() => initScanner(), 100);
            }
        }

        // Student management
        async function addStudent() {
            const studentId = document.getElementById('studentId').value.trim();
            const name = document.getElementById('studentName').value.trim();
            
            if (!studentId || !name) {
                showMessage('Please enter both student ID and name', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/students', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ studentId, name })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Student added successfully', 'success');
                    document.getElementById('studentId').value = '';
                    document.getElementById('studentName').value = '';
                    loadStudents();
                } else {
                    showMessage(result.error || 'Failed to add student', 'error');
                }
            } catch (error) {
                showMessage('Error adding student', 'error');
            }
        }

        async function loadStudents() {
            try {
                const response = await fetch('/api/students');
                students = await response.json();
                displayStudents();
            } catch (error) {
                showMessage('Error loading students', 'error');
            }
        }

        function displayStudents() {
            const container = document.getElementById('studentList');
            container.innerHTML = students.map(student => `
                <div class="student-card">
                    <button class="delete-btn" onclick="deleteStudent('${student.student_id}')" title="Delete student">×</button>
                    <strong>${student.name}</strong><br>
                    <small>ID: ${student.student_id}</small>
                    <div class="qr-code" id="qr-${student.student_id}">
                        <img src="${student.qrCode}" alt="QR Code" style="max-width: 150px;">
                    </div>
                </div>
            `).join('');
        }

        async function generateQRCode() {
            const studentId = document.getElementById('studentId').value.trim();
            const name = document.getElementById('studentName').value.trim();
            
            if (!studentId || !name) {
                showMessage('Please enter both student ID and name', 'error');
                return;
            }
            
            try {
                const response = await fetch(`/api/qrcode/${studentId}/${encodeURIComponent(name)}`);
                const result = await response.json();
                
                if (result.qrCode) {
                    const qrDiv = document.getElementById(`qr-${studentId}`);
                    if (qrDiv) {
                        qrDiv.innerHTML = `<img src="${result.qrCode}" alt="QR Code" style="max-width: 150px;">`;
                    }
                } else {
                    showMessage(result.error || 'Failed to generate QR code', 'error');
                }
            } catch (error) {
                showMessage('Error generating QR code', 'error');
            }
        }

        // Store QR code in localStorage for persistence
        async function storeQRCode(studentId, qrCode) {
            const qrCodes = JSON.parse(localStorage.getItem('qrCodes') || '{}');
            qrCodes[studentId] = qrCode;
            localStorage.setItem('qrCodes', JSON.stringify(qrCodes));
        }

        // Load stored QR codes on page load
        async function loadStoredQRCodes() {
            try {
                const response = await fetch('/api/students');
                const students = await response.json();
                
                if (students && students.length > 0) {
                    students.forEach(student => {
                        if (student.qrCode) {
                            const qrDiv = document.getElementById(`qr-${student.student_id}`);
                            if (qrDiv) {
                                qrDiv.innerHTML = `<img src="${student.qrCode}" alt="QR Code" style="max-width: 150px;">`;
                            }
                        }
                    });
                }
            } catch (error) {
                console.error('Error loading stored QR codes:', error);
            }
        }

        // Delete student function
        async function deleteStudent(studentId) {
            if (!confirm('Are you sure you want to delete this student? This will remove all their attendance records.')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/students/${studentId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('Student deleted successfully', 'success');
                    loadStudents();
                } else {
                    showMessage(result.error || 'Failed to delete student', 'error');
                }
            } catch (error) {
                showMessage('Error deleting student', 'error');
            }
        }

        // Session management
        async function startSession() {
            const section = document.getElementById('sectionSelect').value;
            
            if (!section) {
                showMessage('Please select a section', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/session/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ section })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentSection = result.section;
                    showMessage(`Session started for ${result.section}`, 'success');
                    document.getElementById('currentSection').textContent = result.section;
                    document.getElementById('sessionInfo').style.display = 'block';
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('endBtn').disabled = false;
                } else {
                    showMessage(result.error || 'Failed to start session', 'error');
                }
            } catch (error) {
                showMessage('Error starting session', 'error');
            }
        }

        async function endSession() {
            try {
                const response = await fetch('/api/session/end', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentSection = null;
                    showMessage('Session ended', 'success');
                    document.getElementById('sessionInfo').style.display = 'none';
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('endBtn').disabled = true;
                } else {
                    showMessage(result.error || 'Failed to end session', 'error');
                }
            } catch (error) {
                showMessage('Error ending session', 'error');
            }
        }

        // QR scanning
        function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            
            html5QrCode.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    qrbox: { width: 250, height: 250 }
                },
                (decodedText, result) => {
                    if (decodedText) {
                        processQRScan(decodedText);
                    }
                },
                (errorMessage) => {
                    // handle scan error, silently ignore
                }
            ).catch((err) => {
                console.error(`Unable to start scanning: ${err}`);
            });
        }

        async function processQRScan(qrData) {
            try {
                const data = JSON.parse(qrData);
                
                const response = await fetch('/api/attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        studentId: data.id,
                        name: data.name
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(`Attendance marked for ${result.name} (${result.studentId})`, 'success');
                    document.getElementById('scanResult').innerHTML = `
                        <div class="success-message">
                            ✓ ${result.name} - ${result.studentId}<br>
                            Section: ${result.section}<br>
                            Time: ${new Date().toLocaleString()}
                        </div>
                    `;
                    refreshAttendance();
                } else {
                    showMessage(result.error || 'Failed to mark attendance', 'error');
                    document.getElementById('scanResult').innerHTML = `
                        <div class="error-message">${result.error}</div>
                    `;
                }
            } catch (error) {
                showMessage('Error processing QR scan', 'error');
            }
        }

        // Attendance management
        async function refreshAttendance() {
            try {
                const response = await fetch('/api/attendance');
                attendance = await response.json();
                displayAttendance();
            } catch (error) {
                showMessage('Error loading attendance', 'error');
            }
        }

        function displayAttendance() {
            const container = document.getElementById('attendanceList');
            
            if (attendance.length === 0) {
                container.innerHTML = '<p>No attendance records yet</p>';
                return;
            }
            
            container.innerHTML = attendance.map(record => `
                <div class="attendance-item">
                    <div>
                        <strong>${record.name}</strong><br>
                        <small>ID: ${record.student_id}</small>
                    </div>
                    <div>
                        <span class="section-badge">${record.section}</span><br>
                        <span class="time">${new Date(record.scan_time).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }

        async function exportAttendance() {
            try {
                const response = await fetch('/api/attendance/export');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'attendance.csv';
                a.click();
                window.URL.revokeObjectURL(url);
                showMessage('Attendance exported successfully', 'success');
            } catch (error) {
                showMessage('Error exporting attendance', 'error');
            }
        }

        // Utility functions
        function showMessage(message, type) {
            const existingMessages = document.querySelectorAll('.success-message, .error-message');
            existingMessages.forEach(msg => msg.remove());
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `${type}-message`;
            messageDiv.textContent = message;
            messageDiv.style.position = 'fixed';
            messageDiv.style.top = '20px';
            messageDiv.style.right = '20px';
            messageDiv.style.zIndex = '1000';
            messageDiv.style.padding = '10px';
            messageDiv.style.borderRadius = '4px';
            messageDiv.style.maxWidth = '300px';
            
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        // Initialize on load
        window.onload = function() {
            loadStudents();
            refreshAttendance();
            checkCurrentSession();
        };

        async function checkCurrentSession() {
            try {
                const response = await fetch('/api/session/current');
                const session = await response.json();
                
                if (session && session.is_active) {
                    currentSection = session.section;
                    document.getElementById('currentSection').textContent = session.section;
                    document.getElementById('sessionInfo').style.display = 'block';
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('endBtn').disabled = false;
                }
            } catch (error) {
                console.error('Error checking current session');
            }
        }
    </script>
</body>
</html>
